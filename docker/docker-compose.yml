services:
  postgres:
    image: postgres:15
    container_name: postgres_app
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  frontend:
    build: ../front-produtos
    container_name: angular_frontend
    restart: always
    ports:
      - "4200:4200"
    volumes:
      - ../front-produtos:/app
      - /app/node_modules
    depends_on:
      - backend
  backend:
    build: ../node-crud
    container_name: node_backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ../node-crud:/app
    depends_on:
      - postgres

volumes:
  postgres_data: