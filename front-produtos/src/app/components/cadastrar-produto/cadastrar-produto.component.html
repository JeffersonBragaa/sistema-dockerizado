<main>
  <h2>Cadastrar Produto</h2>

  <div class="card-pai">
    <div class="card">
      <div class="cards">

        <form>
          <input [(ngModel)]="nome" name="nome" type="text" placeholder="Nome do produto">
          <input [(ngModel)]="preco" name="preco" type="number" step="0.01" inputmode="decimal" placeholder="Valor em R$">
          <input [(ngModel)]="quantidade" name="quantidade" type="number" placeholder="Quantidade">

          <div class="bnts">
            <button id="cadastrar" type="button" (click)="cadastrar()">Adicionar</button> 
            <button type="button" (click)="voltarLista()">Voltar</button>
          </div>
        </form>

      </div>
    </div>
  </div>
</main>
